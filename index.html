<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>あみだくじ 飲みゲーム</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans',
                   'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ─── SCREEN BASE ─── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-bottom: 64px;
    }
    .screen.hidden { display: none; }
    #input-screen { overflow-y: auto; }

    /* ─── FIXED BUTTON ─── */
    .fixed-btn {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 64px;
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #fff;
      background: linear-gradient(135deg, #f97316, #ef4444);
      transition: opacity 0.1s;
      z-index: 100;
    }
    .fixed-btn:active  { opacity: 0.75; }
    .fixed-btn:disabled {
      background: linear-gradient(135deg, #475569, #334155);
      cursor: default;
    }

    /* ─────────────────────────────────────
       SCREEN 1 : INPUT
    ───────────────────────────────────── */
    .input-title {
      text-align: center;
      padding: 18px 16px 12px;
      font-size: 22px;
      font-weight: bold;
      color: #fbbf24;
      letter-spacing: 2px;
      line-height: 1.65;
    }
    .input-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 20px;
    }

    /* プレイヤー行：アバター ＋ 入力フィールド */
    .player-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(15, 15, 35, 0.7);
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 7px 14px;
    }

    /* アバターボタン（丸いカメラボタン） */
    .avatar-wrap {
      flex-shrink: 0;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: 2px dashed #475569;
      background: #0f0f23;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
    }
    .avatar-wrap:active { transform: scale(0.92); }

    /* ファイル入力: overflow:hidden の外に配置しつつ画面外に隠す
       display:none / visibility:hidden だと iOS Safari の label 連携が動かないため
       position:fixed で画面外へ飛ばす方式を使う */
    .av-file-hidden {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .avatar-wrap.has-photo {
      border: 3px solid #f97316;
      box-shadow: 0 0 16px rgba(249, 115, 22, 0.45);
    }
    .avatar-wrap .av-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      pointer-events: none;
    }
    .avatar-wrap.has-photo .av-img  { display: block; }
    .avatar-wrap.has-photo .cam-icon { display: none; }

    .input-field {
      flex: 1;
      min-width: 0;
      padding: 14px 16px;
      background: #0f0f23;
      border: 2px solid #334155;
      border-radius: 12px;
      font-size: 18px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus        { border-color: #f97316; }
    .input-field::placeholder { color: #475569; }

    /* ─────────────────────────────────────
       SCREEN 2 : AMIDA
    ───────────────────────────────────── */
    .names-row,
    .goals-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      flex-shrink: 0;
    }
    .names-row { height: 100px; } /* 写真 + 名前 */
    .goals-row { height: 56px; }

    .name-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 11px;
      font-weight: bold;
      color: #e2e8f0;
      padding: 4px 2px;
      overflow: hidden;
    }
    .name-cell .nc-photo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid #475569;
      flex-shrink: 0;
    }
    .name-cell .nc-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .goal-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .goal-cell.safe  { font-size: 18px; color: #4ade80; }
    .goal-cell.drink { font-size: 22px; color: #f97316; }

    #amida-canvas {
      flex: 1;
      display: block;
      width: 100%;
      min-height: 0;
    }

    /* ─────────────────────────────────────
       POPUP FLASH OVERLAY
    ───────────────────────────────────── */
    #popup-flash {
      position: fixed;
      inset: 0;
      background: rgba(239, 68, 68, 0.55);
      z-index: 195;
      pointer-events: none;
      opacity: 0;
    }
    #popup-flash.active { animation: screenFlash 0.9s ease-out forwards; }

    /* ─────────────────────────────────────
       POPUP : 飲み
    ───────────────────────────────────── */
    #popup {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 28, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding-bottom: 64px;
      padding-left: 24px;
      padding-right: 24px;
    }
    #popup.hidden { display: none; }

    #retry-btn { z-index: 210; }

    .popup-inner {
      text-align: center;
      background: linear-gradient(160deg, rgba(35, 12, 12, 0.97), rgba(20, 8, 8, 0.99));
      border: 1.5px solid rgba(239, 68, 68, 0.5);
      border-radius: 32px;
      padding: 24px 32px 22px;
      box-shadow: 0 12px 56px rgba(0, 0, 0, 0.85), 0 0 60px rgba(239, 68, 68, 0.2);
      max-width: 360px;
      width: 100%;
      animation: drinkReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 borderPulse 2s ease-in-out 0.6s infinite;
    }
    .popup-verdict {
      display: inline-block;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #ef4444;
      border: 2px solid rgba(239, 68, 68, 0.6);
      border-radius: 6px;
      padding: 4px 14px;
      margin-bottom: 16px;
    }
    .popup-photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ef4444;
      box-shadow: 0 0 32px rgba(239, 68, 68, 0.7), 0 0 80px rgba(239, 68, 68, 0.3);
      margin-bottom: 14px;
      display: none;
      animation: dangerPulse 1.5s ease-in-out infinite;
    }
    .popup-photo.show { display: inline-block; }
    .popup-fallback-icon {
      font-size: 88px;
      display: block;
      margin-bottom: 8px;
      animation: fallbackBounce 1s ease-in-out infinite;
    }
    .popup-who { margin-bottom: 8px; }
    .popup-who strong {
      display: block;
      font-size: 44px;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.7), 0 2px 8px rgba(0, 0, 0, 0.6);
    }
    .popup-who-sub {
      font-size: 16px;
      color: #cbd5e1;
      margin-top: 3px;
    }
    .popup-drink {
      display: block;
      font-size: 72px;
      font-weight: bold;
      color: #fbbf24;
      letter-spacing: 0;
      text-shadow: 0 0 32px rgba(251, 191, 36, 0.9), 0 0 72px rgba(251, 191, 36, 0.4);
      -webkit-text-stroke: 1px rgba(249, 115, 22, 0.5);
      animation: bounce 0.9s ease-in-out infinite;
      margin-bottom: 10px;
    }
    .popup-beers {
      font-size: 28px;
      letter-spacing: 6px;
      animation: beerFloat 1.2s ease-in-out infinite;
    }

    @keyframes screenFlash {
      0%   { opacity: 0.85; }
      100% { opacity: 0; }
    }
    @keyframes drinkReveal {
      0%   { transform: scale(0.15) rotate(-10deg); opacity: 0; }
      55%  { transform: scale(1.07) rotate(1.5deg);  opacity: 1; }
      75%  { transform: scale(0.97) rotate(-0.5deg); }
      90%  { transform: scale(1.02) rotate(0.3deg); }
      100% { transform: scale(1)    rotate(0deg);    opacity: 1; }
    }
    @keyframes borderPulse {
      0%, 100% { box-shadow: 0 12px 56px rgba(0,0,0,0.85), 0 0 40px rgba(239,68,68,0.2); }
      50%       { box-shadow: 0 12px 56px rgba(0,0,0,0.85), 0 0 80px rgba(239,68,68,0.45); }
    }
    @keyframes dangerPulse {
      0%, 100% { border-color: #ef4444; box-shadow: 0 0 32px rgba(239,68,68,0.7), 0 0 80px rgba(239,68,68,0.3); }
      50%       { border-color: #f97316; box-shadow: 0 0 48px rgba(249,115,22,0.8), 0 0 100px rgba(249,115,22,0.35); }
    }
    @keyframes fallbackBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-10px) scale(1.1); }
    }
    @keyframes beerFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-6px) scale(1.06); }
    }
    @keyframes bounce {
      0%   { transform: scale(0.9) translateY(6px); }
      50%  { transform: scale(1.18) translateY(-14px); }
      100% { transform: scale(0.9) translateY(6px); }
    }
    @keyframes emojifall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SCREEN 1 : 名前入力
════════════════════════════════════════ -->
<div id="input-screen" class="screen">
  <h1 class="input-title">🍺 あみだくじ<br>飲みゲーム 🍺</h1>
  <div class="input-list">

    <div class="player-row">
      <label class="avatar-wrap" id="av-wrap0" for="av-file0">
        <span class="cam-icon">📷</span>
        <img class="av-img" id="av-img0" alt="">
      </label>
      <input id="p0" class="input-field" type="text" value="プレイヤー1" autocomplete="off">
    </div>

    <div class="player-row">
      <label class="avatar-wrap" id="av-wrap1" for="av-file1">
        <span class="cam-icon">📷</span>
        <img class="av-img" id="av-img1" alt="">
      </label>
      <input id="p1" class="input-field" type="text" value="プレイヤー2" autocomplete="off">
    </div>

    <div class="player-row">
      <label class="avatar-wrap" id="av-wrap2" for="av-file2">
        <span class="cam-icon">📷</span>
        <img class="av-img" id="av-img2" alt="">
      </label>
      <input id="p2" class="input-field" type="text" value="プレイヤー3" autocomplete="off">
    </div>

    <div class="player-row">
      <label class="avatar-wrap" id="av-wrap3" for="av-file3">
        <span class="cam-icon">📷</span>
        <img class="av-img" id="av-img3" alt="">
      </label>
      <input id="p3" class="input-field" type="text" value="プレイヤー4" autocomplete="off">
    </div>

    <!-- file inputs: overflow:hidden の外・画面外に配置（iOS Safari の label 連携に必須） -->
    <input id="av-file0" type="file" accept="image/*" class="av-file-hidden">
    <input id="av-file1" type="file" accept="image/*" class="av-file-hidden">
    <input id="av-file2" type="file" accept="image/*" class="av-file-hidden">
    <input id="av-file3" type="file" accept="image/*" class="av-file-hidden">

  </div>
  <button id="to-amida-btn" class="fixed-btn">あみだを作る！</button>
</div>

<!-- ═══════════════════════════════════════
     SCREEN 2 : あみだくじ
════════════════════════════════════════ -->
<div id="amida-screen" class="screen hidden">
  <div id="names-top"    class="names-row"></div>
  <canvas id="amida-canvas"></canvas>
  <div id="goals-bottom" class="goals-row"></div>
  <button id="start-btn" class="fixed-btn">スタート！</button>
</div>

<!-- ═══════════════════════════════════════
     POPUP FLASH OVERLAY
════════════════════════════════════════ -->
<div id="popup-flash"></div>

<!-- ═══════════════════════════════════════
     POPUP : 飲み
════════════════════════════════════════ -->
<div id="popup" class="hidden">
  <div class="popup-inner">
    <div class="popup-verdict">⚠️ 判　決 ⚠️</div>
    <img id="drinker-photo" class="popup-photo" alt="">
    <div id="popup-fallback-icon" class="popup-fallback-icon">🍺</div>
    <div class="popup-who">
      <strong id="drinker-name"></strong>
      <div class="popup-who-sub">が飲みます！！</div>
    </div>
    <span class="popup-drink">飲み！</span>
    <div class="popup-beers">🍺 🍻 🍺 🍻 🍺</div>
  </div>
  <button id="retry-btn" class="fixed-btn">もう一度！</button>
</div>

<script>
// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const NUM     = 4;
const ROWS    = 12;
const ANIM_MS = 12000; // 1/5 speed
const COLORS  = ['#60a5fa', '#f472b6', '#34d399', '#fbbf24'];

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let players      = ['プレイヤー1', 'プレイヤー2', 'プレイヤー3', 'プレイヤー4'];
let playerPhotos = [null, null, null, null]; // dataURL
let playerImages = [null, null, null, null]; // HTMLImageElement
let bridges      = [];
let goals        = [];
let ppaths       = [];
let colX         = [];
let topY, bottomY;
let rowY         = [];

// ════════════════════════════════════════
//  DOM
// ════════════════════════════════════════
const $  = id => document.getElementById(id);
const inputScreen = $('input-screen');
const amidaScreen = $('amida-screen');
const popup       = $('popup');
const canvas      = $('amida-canvas');
const ctx         = canvas.getContext('2d');

// ════════════════════════════════════════
//  CAMERA BUTTON SETUP
// ════════════════════════════════════════
// iOS Safari 対応:
//   - <label for="av-fileX"> がタップを受け取り、画面外の file input を起動
//   - overflow:hidden コンテナ内の file input は iOS Safari でタップ不可のため
//     file input は input-list の末尾（overflow:hidden の外）に配置済み
for (let i = 0; i < NUM; i++) {
  const avWrap    = $(`av-wrap${i}`);
  const fileInput = $(`av-file${i}`);

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const objectURL = URL.createObjectURL(file);
    const tempImg = new Image();
    tempImg.onload = () => {
      // canvas で JPEG 変換を試みる
      // HEIC 等では toDataURL が SecurityError をスローする場合があるため try/catch
      let dataURL = null;
      try {
        const MAX = 400;
        let w = tempImg.naturalWidth, h = tempImg.naturalHeight;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else        { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        const cvs = document.createElement('canvas');
        cvs.width = w; cvs.height = h;
        cvs.getContext('2d').drawImage(tempImg, 0, 0, w, h);
        const r = cvs.toDataURL('image/jpeg', 0.85);
        if (r && r.length > 200) dataURL = r;
      } catch (_) {}

      // canvas 成功 → JPEG dataURL / 失敗（HEIC taint 等）→ blob URL を直接使用
      const src = dataURL || objectURL;
      if (dataURL) URL.revokeObjectURL(objectURL);

      playerPhotos[i] = src;
      $(`av-img${i}`).src = src;
      avWrap.classList.add('has-photo');

      const img = new Image();
      img.onload = () => { playerImages[i] = img; };
      img.src = src;

      fileInput.value = '';
    };
    tempImg.onerror = () => URL.revokeObjectURL(objectURL);
    tempImg.src = objectURL;
  });
}

// ════════════════════════════════════════
//  EVENTS
// ════════════════════════════════════════
$('to-amida-btn').addEventListener('click', () => {
  for (let i = 0; i < NUM; i++) {
    const v = $(`p${i}`).value.trim();
    players[i] = v || `プレイヤー${i + 1}`;
  }
  showAmida();
});

$('start-btn').addEventListener('click', function () {
  this.disabled = true;
  runAnimation();
});

$('retry-btn').addEventListener('click', () => {
  popup.classList.add('hidden');
  showAmida();
});

// ════════════════════════════════════════
//  SCREEN TRANSITION
// ════════════════════════════════════════
function showAmida() {
  inputScreen.classList.add('hidden');
  amidaScreen.classList.remove('hidden');
  popup.classList.add('hidden');
  $('start-btn').disabled = false;

  generate();

  requestAnimationFrame(() => requestAnimationFrame(() => {
    initCanvas();
    renderLabels();
    drawStatic();
  }));
}

// ════════════════════════════════════════
//  AMIDA GENERATION
// ════════════════════════════════════════
function generate() {
  bridges = [];
  for (let row = 0; row < ROWS; row++) {
    let col = 0;
    while (col < NUM - 1) {
      if (Math.random() < 0.5) {
        bridges.push({ row, col });
        col += 2;
      } else {
        col++;
      }
    }
  }
  const drinkCol = Math.floor(Math.random() * NUM);
  goals = Array(NUM).fill('セーフ');
  goals[drinkCol] = '飲み';
}

// ════════════════════════════════════════
//  CANVAS INIT
// ════════════════════════════════════════
function initCanvas() {
  const W   = canvas.clientWidth;
  const H   = canvas.clientHeight;
  const dpr = window.devicePixelRatio || 1;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  colX = [];
  for (let i = 0; i < NUM; i++) {
    colX.push(W * (2 * i + 1) / (2 * NUM));
  }

  topY    = H * 0.04;
  bottomY = H * 0.96;
  rowY    = [];
  const span = bottomY - topY;
  for (let r = 0; r < ROWS; r++) {
    rowY.push(topY + (r + 0.5) * span / ROWS);
  }
}

// ════════════════════════════════════════
//  DRAW STATIC AMIDA
// ════════════════════════════════════════
function drawStatic() {
  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';

  for (let i = 0; i < NUM; i++) {
    ctx.beginPath();
    ctx.moveTo(colX[i], topY);
    ctx.lineTo(colX[i], bottomY);
    ctx.stroke();
  }
  for (const b of bridges) {
    ctx.beginPath();
    ctx.moveTo(colX[b.col],     rowY[b.row]);
    ctx.lineTo(colX[b.col + 1], rowY[b.row]);
    ctx.stroke();
  }
}

// ════════════════════════════════════════
//  RENDER NAME / GOAL LABELS
// ════════════════════════════════════════
function renderLabels() {
  // 名前（上部）: 写真があれば写真＋名前
  const nt = $('names-top');
  nt.innerHTML = '';
  players.forEach((name, i) => {
    const d = document.createElement('div');
    d.className = 'name-cell';

    if (playerPhotos[i]) {
      const img = document.createElement('img');
      img.className = 'nc-photo';
      img.src = playerPhotos[i];
      img.alt = name;
      d.appendChild(img);
    }

    const span = document.createElement('span');
    span.className = 'nc-text';
    span.textContent = name;
    d.appendChild(span);

    nt.appendChild(d);
  });

  // ゴール（下部）
  const gb = $('goals-bottom');
  gb.innerHTML = '';
  goals.forEach(g => {
    const d = document.createElement('div');
    d.className   = `goal-cell ${g === '飲み' ? 'drink' : 'safe'}`;
    d.textContent = g;
    gb.appendChild(d);
  });
}

// ════════════════════════════════════════
//  PATH BUILDING
// ════════════════════════════════════════
function buildPaths() {
  ppaths = [];
  for (let start = 0; start < NUM; start++) {
    let col = start;
    const pts = [{ x: colX[col], y: topY }];

    for (let row = 0; row < ROWS; row++) {
      pts.push({ x: colX[col], y: rowY[row] });

      const rb = bridges.find(b => b.row === row && b.col === col);
      const lb = bridges.find(b => b.row === row && b.col === col - 1);
      if (rb) {
        col++;
        pts.push({ x: colX[col], y: rowY[row] });
      } else if (lb) {
        col--;
        pts.push({ x: colX[col], y: rowY[row] });
      }
    }
    pts.push({ x: colX[col], y: bottomY });
    ppaths.push({ pts, endCol: col });
  }
}

// ════════════════════════════════════════
//  HELPER: セグメント配列の事前計算
// ════════════════════════════════════════
function calcSegs(pts) {
  let total = 0;
  const segs = [];
  for (let i = 1; i < pts.length; i++) {
    const len = Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
    segs.push(len);
    total += len;
  }
  return { segs, total };
}

// ════════════════════════════════════════
//  HELPER: 経路上の現在位置を返す
// ════════════════════════════════════════
function getPosAlongPath(pts, segs, total, progress) {
  const target = progress * total;
  let drawn = 0;
  for (let i = 0; i < segs.length; i++) {
    if (drawn + segs[i] <= target) {
      drawn += segs[i];
    } else {
      const r = (target - drawn) / segs[i];
      return {
        x: pts[i].x + (pts[i+1].x - pts[i].x) * r,
        y: pts[i].y + (pts[i+1].y - pts[i].y) * r
      };
    }
  }
  return pts[pts.length - 1];
}

// ════════════════════════════════════════
//  HELPER: 角丸矩形を塗りつぶす
// ════════════════════════════════════════
function fillRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
  ctx.fill();
}

// ════════════════════════════════════════
//  DRAW TRAIL: 通過済み経路を薄く描画
// ════════════════════════════════════════
function drawTrail(idx, segs, total, progress) {
  const { pts } = ppaths[idx];
  const target  = progress * total;

  ctx.strokeStyle = COLORS[idx] + '55';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);

  let drawn = 0;
  for (let i = 0; i < segs.length; i++) {
    if (drawn + segs[i] <= target) {
      ctx.lineTo(pts[i+1].x, pts[i+1].y);
      drawn += segs[i];
    } else {
      const r = (target - drawn) / segs[i];
      ctx.lineTo(
        pts[i].x + (pts[i+1].x - pts[i].x) * r,
        pts[i].y + (pts[i+1].y - pts[i].y) * r
      );
      break;
    }
  }
  ctx.stroke();
}

// ════════════════════════════════════════
//  DRAW BADGE: 写真 + 名前が一緒に動く
// ════════════════════════════════════════
function drawNameBadge(idx, segs, total, progress) {
  const { pts } = ppaths[idx];
  const pos  = getPosAlongPath(pts, segs, total, progress);
  const name = players[idx];
  const img  = playerImages[idx];

  const FONT_SIZE = 10;
  ctx.font = `bold ${FONT_SIZE}px -apple-system, 'Hiragino Sans', sans-serif`;
  const textW = ctx.measureText(name).width;

  if (img && img.complete && img.naturalWidth > 0) {
    // ── 写真 + 名前バッジ ──────────────────
    const PHOTO_R  = 28;           // 写真の半径
    const PHOTO_D  = PHOTO_R * 2;
    const PILL_PX  = 6;            // 名前ピルの左右パディング
    const PILL_PY  = 3;            // 名前ピルの上下パディング
    const pillW    = Math.max(PHOTO_D + 4, textW + PILL_PX * 2);
    const pillH    = FONT_SIZE + PILL_PY * 2;
    const GAP      = 2;            // 写真とピルの間隔
    const TOTAL_H  = PHOTO_D + GAP + pillH;

    // 全体の垂直中心 = pos.y
    const photoTopY = pos.y - TOTAL_H / 2;
    const photoCY   = photoTopY + PHOTO_R;
    const pillTopY  = photoTopY + PHOTO_D + GAP;

    // ── 写真（丸く切り抜き）
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur  = 6;
    ctx.save();
    ctx.beginPath();
    ctx.arc(pos.x, photoCY, PHOTO_R, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, pos.x - PHOTO_R, photoCY - PHOTO_R, PHOTO_D, PHOTO_D);
    ctx.restore();
    ctx.shadowBlur = 0;

    // 写真の枠線（プレイヤーカラー）
    ctx.strokeStyle = COLORS[idx];
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(pos.x, photoCY, PHOTO_R, 0, Math.PI * 2);
    ctx.stroke();

    // ── 名前ピル
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur  = 5;
    ctx.fillStyle   = COLORS[idx];
    fillRoundRect(pos.x - pillW / 2, pillTopY, pillW, pillH, pillH / 2);
    ctx.shadowBlur = 0;

    ctx.fillStyle    = '#1a1a2e';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, pos.x, pillTopY + pillH / 2);

  } else {
    // ── 写真なし：テキストバッジのみ（従来どおり）
    const padX = 8, padY = 5;
    const w = textW + padX * 2;
    const h = FONT_SIZE + padY * 2;
    const r = h / 2;
    const bx = pos.x - w / 2;
    const by = pos.y - h / 2;

    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = COLORS[idx];
    fillRoundRect(bx, by, w, h, r);
    ctx.shadowBlur = 0;

    ctx.fillStyle    = '#1a1a2e';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(name, pos.x, pos.y);
  }
}

// ════════════════════════════════════════
//  ANIMATION
// ════════════════════════════════════════
let rafId = null, animStart = null;

function runAnimation() {
  buildPaths();
  animStart = null;
  if (rafId) cancelAnimationFrame(rafId);

  $('names-top').style.visibility = 'hidden';

  const pathMeta = ppaths.map(p => calcSegs(p.pts));

  function frame(ts) {
    if (!animStart) animStart = ts;
    const prog = Math.min((ts - animStart) / ANIM_MS, 1);

    drawStatic();
    for (let i = 0; i < NUM; i++) {
      drawTrail(i, pathMeta[i].segs, pathMeta[i].total, prog);
    }
    for (let i = 0; i < NUM; i++) {
      drawNameBadge(i, pathMeta[i].segs, pathMeta[i].total, prog);
    }

    if (prog < 1) {
      rafId = requestAnimationFrame(frame);
    } else {
      onAnimDone();
    }
  }
  rafId = requestAnimationFrame(frame);
}

function onAnimDone() {
  $('start-btn').disabled = false;
  $('names-top').style.visibility = 'visible';

  let drinker = -1;
  for (let i = 0; i < NUM; i++) {
    if (goals[ppaths[i].endCol] === '飲み') { drinker = i; break; }
  }

  if (drinker !== -1) {
    setTimeout(() => {
      $('drinker-name').textContent = players[drinker];

      // 写真があればポップアップに表示
      const photoEl    = $('drinker-photo');
      const fallbackEl = $('popup-fallback-icon');
      if (playerPhotos[drinker]) {
        photoEl.src = playerPhotos[drinker];
        photoEl.classList.add('show');
        fallbackEl.style.display = 'none';
      } else {
        photoEl.classList.remove('show');
        fallbackEl.style.display = '';
      }

      // 画面フラッシュ
      const flash = $('popup-flash');
      flash.classList.remove('active');
      void flash.offsetWidth; // reflow
      flash.classList.add('active');

      popup.classList.remove('hidden');

      // 落下エモジ演出
      spawnFallingEmojis();
    }, 500);
  }
}

function spawnFallingEmojis() {
  const EMOJIS = ['🍺', '🍻', '😱', '💀', '🍺', '🍺', '😭'];
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const el  = document.createElement('div');
      const sz  = 20 + Math.random() * 26;
      const dur = 2 + Math.random() * 2;
      el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      el.style.cssText = `position:fixed;top:-60px;left:${Math.random()*100}vw;font-size:${sz}px;pointer-events:none;z-index:300;animation:emojifall ${dur}s linear forwards;`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, Math.random() * 1800);
  }
}

// ════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════
window.addEventListener('resize', () => {
  if (!amidaScreen.classList.contains('hidden')) {
    initCanvas();
    renderLabels();
    drawStatic();
  }
});
</script>
